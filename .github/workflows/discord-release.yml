name: Discord Release Announcement

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_version:
        description: 'Test version number (e.g. v2.1.1-test)'
        required: true
        default: 'v0.0.0-test'
      test_body:
        description: 'Test release notes'
        required: false
        default: 'Test announcement from workflow_dispatch'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          ASSETS_URL: ${{ github.event.release.assets_url }}
          INPUT_VERSION: ${{ github.event.inputs.test_version }}
          INPUT_BODY: ${{ github.event.inputs.test_body }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping"
            exit 0
          fi

          if [ "$EVENT_NAME" = "release" ]; then
            VERSION="$RELEASE_TAG"
            RNAME="${RELEASE_NAME:-$RELEASE_TAG}"
            RURL="$RELEASE_URL"
            BODY="$RELEASE_BODY"
            AURL="$ASSETS_URL"
          else
            VERSION="$INPUT_VERSION"
            RNAME="$INPUT_VERSION"
            RURL="https://github.com/3iiik/Forca/releases"
            BODY="$INPUT_BODY"
            AURL=""
          fi

          VERSION="${VERSION:-unknown}"
          RNAME="${RNAME:-$VERSION}"
          RURL="${RURL:-https://github.com/3iiik/Forca/releases}"

          echo "Sending announcement for $VERSION"

          DOWNLOADS="Available on GitHub"
          if [ -n "$AURL" ]; then
            DL_JSON=$(curl -s "$AURL" | jq -r '.[:6] | .[] | "\(.name): \(.browser_download_url)"')
            if [ -n "$DL_JSON" ]; then
              DOWNLOADS="$DL_JSON"
            fi
          fi

          BODY_TRUNC="$BODY"
          if [ ${#BODY_TRUNC} -gt 3500 ]; then
            BODY_TRUNC="${BODY_TRUNC:0:3500}
            ..."
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg rname "$RNAME" \
            --arg rurl "$RURL" \
            --arg body "$BODY_TRUNC" \
            --arg downloads "$DOWNLOADS" \
            '{
              content: "@here **Forca \($version)** has been released!",
              embeds: [{
                title: "Release \($version)",
                url: $rurl,
                color: 1949301,
                fields: ([
                  (if $rname != $version then {name: "Release", value: $rname, inline: true} else null end),
                  {name: "Version", value: $version, inline: true},
                  (if $body != "" then {name: "What'\''s New", value: $body} else null end),
                  {name: "Downloads", value: $downloads},
                  {name: "GitHub Release", value: $rurl}
                ] | map(select(. != null)))
              }]
            }' > /tmp/discord-payload.json

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @/tmp/discord-payload.json && echo "Discord webhook sent"
