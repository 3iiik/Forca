name: Discord Release Announcement

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_version:
        description: 'Test version number (e.g. v2.1.1-test)'
        required: true
        default: 'v0.0.0-test'
      test_body:
        description: 'Test release notes'
        required: false
        default: 'Test announcement from workflow_dispatch'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          ASSETS_URL: ${{ github.event.release.assets_url }}
          INPUT_VERSION: ${{ github.event.inputs.test_version }}
          INPUT_BODY: ${{ github.event.inputs.test_body }}
        run: |
          # Build the download links from release assets
          ASSETS=""
          if [ -n "$ASSETS_URL" ]; then
            ASSETS=$(curl -s "$ASSETS_URL" | jq -r '.[] | "\(.name): \(.browser_download_url)"' | head -10)
          fi

          # Format release notes (truncate to keep within Discord's 6000-char embed limit)
          NOTES=$(echo "$BODY" | head -50 | python3 -c "
import sys, json
text = sys.stdin.read()
if len(text) > 3500:
    text = text[:3500] + '\n\n...'
print(json.dumps(text))
")

          # Build the download links field
          DL_FIELD=$(echo "$ASSETS" | head -6 | python3 -c "
import sys, json
lines = [l.strip() for l in sys.stdin if l.strip()]
if not lines:
    print(json.dumps('Available on GitHub'))
else:
    text = '\n'.join(lines)
    print(json.dumps(text))
")

          python3 -c "
import json, os

webhook_url = os.environ['DISCORD_WEBHOOK_URL']
event_name = os.environ.get('EVENT_NAME', '')

# Determine if this is a real release or manual test
if event_name == 'release':
    version = os.environ.get('RELEASE_TAG', 'unknown')
    release_name = os.environ.get('RELEASE_NAME', '') or version
    release_url = os.environ.get('RELEASE_URL', '')
else:
    version = os.environ.get('INPUT_VERSION', 'v0.0.0-test')
    release_name = version
    release_url = os.environ.get('RELEASE_URL', 'https://github.com/3iiik/Forca/releases')

notes = os.environ.get('NOTES', '')
download_field = os.environ.get('DL_FIELD', '')

embed = {
    'title': f'Release {version}',
    'url': release_url,
    'color': 0x1D9E75,
    'fields': []
}

if release_name and release_name != version:
    embed['fields'].append({
        'name': 'Release',
        'value': release_name,
        'inline': True
    })

embed['fields'].append({
    'name': 'Version',
    'value': version,
    'inline': True
})

if notes:
    embed['fields'].append({
        'name': 'What\'s New',
        'value': notes
    })

if download_field:
    embed['fields'].append({
        'name': 'Downloads',
        'value': download_field
    })

embed['fields'].append({
    'name': 'GitHub Release',
    'value': release_url
})

payload = {
    'content': f'@here **Forca {version}** has been released!',
    'embeds': [embed]
}

import urllib.request
req = urllib.request.Request(
    webhook_url,
    data=json.dumps(payload).encode('utf-8'),
    headers={'Content-Type': 'application/json'}
)
urllib.request.urlopen(req)
"
