name: Discord Release Announcement

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_version:
        description: 'Test version number (e.g. v2.1.1-test)'
        required: true
        default: 'v0.0.0-test'
      test_body:
        description: 'Test release notes'
        required: false
        default: 'Test announcement from workflow_dispatch'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare release variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=${{ github.event.release.name }}" >> $GITHUB_OUTPUT
            echo "RELEASE_URL=${{ github.event.release.html_url }}" >> $GITHUB_OUTPUT
            echo "RELEASE_BODY<<BODYEOF" >> $GITHUB_OUTPUT
            echo "${{ github.event.release.body }}" >> $GITHUB_OUTPUT
            echo "BODYEOF" >> $GITHUB_OUTPUT
            echo "ASSETS_URL=${{ github.event.release.assets_url }}" >> $GITHUB_OUTPUT
            echo "TIMESTAMP=${{ github.event.release.published_at }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.test_version }}" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=${{ github.event.inputs.test_version }}" >> $GITHUB_OUTPUT
            echo "RELEASE_URL=https://github.com/3iiik/Forca/releases" >> $GITHUB_OUTPUT
            echo "RELEASE_BODY=${{ github.event.inputs.test_body }}" >> $GITHUB_OUTPUT
            echo "ASSETS_URL=" >> $GITHUB_OUTPUT
            echo "TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n2 | tail -n1)
          CURR_TAG="${{ steps.vars.outputs.VERSION }}"
          echo "Generating changelog from $PREV_TAG to $CURR_TAG"
          node scripts/generate-changelog.mjs --from "$PREV_TAG" --to "$CURR_TAG" > /tmp/changelog.json

      - name: Fetch download assets
        id: downloads
        run: |
          ASSETS_URL="${{ steps.vars.outputs.ASSETS_URL }}"
          if [ -n "$ASSETS_URL" ]; then
            curl -s "$ASSETS_URL" | jq -r '[.[] | {name: .name, url: .browser_download_url}]' > /tmp/downloads.json
          else
            echo '[]' > /tmp/downloads.json
          fi

      - name: Build Discord embed
        id: embed
        run: |
          VERSION="${{ steps.vars.outputs.VERSION }}"
          RELEASE_NAME="${{ steps.vars.outputs.RELEASE_NAME }}"
          RELEASE_URL="${{ steps.vars.outputs.RELEASE_URL }}"
          RELEASE_BODY="${{ steps.vars.outputs.RELEASE_BODY }}"
          TIMESTAMP="${{ steps.vars.outputs.TIMESTAMP }}"

          jq -n \
            --arg version "$VERSION" \
            --arg releaseName "$RELEASE_NAME" \
            --arg releaseUrl "$RELEASE_URL" \
            --arg releaseBody "$RELEASE_BODY" \
            --arg timestamp "$TIMESTAMP" \
            '{
              version: $version,
              releaseName: $releaseName,
              releaseUrl: $releaseUrl,
              releaseBody: $releaseBody,
              timestamp: $timestamp,
              downloads: [],
              changelog: null
            }' > /tmp/embed-input.json

          # Merge downloads
          DL_COUNT=$(jq 'length' /tmp/downloads.json)
          if [ "$DL_COUNT" -gt 0 ]; then
            jq --slurpfile dl /tmp/downloads.json '.downloads = $dl[0]' /tmp/embed-input.json > /tmp/embed-input2.json
            mv /tmp/embed-input2.json /tmp/embed-input.json
          fi

          # Merge changelog
          if [ -f /tmp/changelog.json ] && [ -s /tmp/changelog.json ]; then
            jq --slurpfile cl /tmp/changelog.json '.changelog = $cl[0]' /tmp/embed-input.json > /tmp/embed-input2.json
            mv /tmp/embed-input2.json /tmp/embed-input.json
          fi

          node scripts/discord-embed.mjs < /tmp/embed-input.json > /tmp/discord-payload.json
          echo "Payload generated"

      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping"
            exit 0
          fi

          echo "Sending announcement..."
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @/tmp/discord-payload.json && echo "Discord webhook sent"

      - name: Validate payload (dry-run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "=== Generated Payload (preview) ==="
          jq -r '.content' /tmp/discord-payload.json
          echo "---"
          jq -r '.embeds[0].fields[] | "\(.name): \(.value | .[0:80])..."' /tmp/discord-payload.json
          echo "=== End Payload ==="
