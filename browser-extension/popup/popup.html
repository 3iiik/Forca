<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forca</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <svg width="24" height="24" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
        <circle cx="48" cy="48" r="26" fill="none" stroke="#44403C" stroke-width="3.5"/>
        <circle cx="48" cy="48" r="26" fill="none" stroke="#1D9E75" stroke-width="3.5" stroke-dasharray="81 163" stroke-dashoffset="41" stroke-linecap="round"/>
        <circle cx="48" cy="48" r="7" fill="#1D9E75"/>
        <rect x="46.5" y="18" width="3" height="11" rx="1.5" fill="#78716C"/>
        <rect x="46.5" y="67" width="3" height="11" rx="1.5" fill="#78716C"/>
        <rect x="18" y="46.5" width="11" height="3" rx="1.5" fill="#78716C"/>
        <rect x="67" y="46.5" width="11" height="3" rx="1.5" fill="#78716C"/>
      </svg>
      <span class="brand">Forca</span>
    </div>

    <div id="statusContainer">
      <div class="card disconnected" id="statusDisconnected">
        <div class="card-dot gray"></div>
        <div class="card-body">
          <div class="card-label">Disconnected</div>
          <div class="card-desc">Reconnect to resume</div>
        </div>
        <button id="reconnectBtn" class="btn-sm">Reconnect</button>
      </div>
      <div class="card connecting" id="statusConnecting" style="display:none;">
        <div class="spinner"></div>
        <div class="card-body">
          <div class="card-label">Connecting</div>
          <div class="card-desc">Establishing connection...</div>
        </div>
      </div>
      <div class="card idle" id="statusIdle" style="display:none;">
        <div class="card-dot gray"></div>
        <div class="card-body">
          <div class="card-label">No Active Zone</div>
          <div class="card-desc">Connected and ready. Open the desktop app to create or start a Focus Zone.</div>
        </div>
      </div>
      <div class="card active" id="statusActive" style="display:none;">
        <div class="card-header-row">
          <div class="card-dot green"></div>
          <span class="card-pill">Active</span>
        </div>
        <div class="card-body">
          <div class="zone-name" id="activeZoneName">—</div>
          <div class="timer-display" id="activeTimeRemaining">00:00</div>
          <div class="sites-count" id="activeSitesCount">0 sites blocked</div>
        </div>
      </div>
      <div class="card paused" id="statusPaused" style="display:none;">
        <div class="card-header-row">
          <div class="card-dot yellow"></div>
          <span class="card-pill yellow">Paused</span>
        </div>
        <div class="card-body">
          <div class="zone-name" id="pausedZoneName">—</div>
          <div class="paused-label">Zone paused</div>
        </div>
      </div>
    </div>

    <div class="actions" id="actionsContainer" style="display:none;">
      <button id="pauseActionBtn" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pause Zone
      </button>
      <button id="endActionBtn" class="btn-outline">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        End Zone
      </button>
    </div>

    <div class="footer">
      <span class="footer-version">Forca</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
