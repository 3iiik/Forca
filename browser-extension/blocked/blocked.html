<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocked by Forca</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧘</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0a1a;
      color: #EDE9F5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .icon { font-size: 3.5rem; margin-bottom: 1.25rem; }
    h1 {
      color: #3D2FA8;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 0.375rem;
    }
    .subtitle {
      color: #8B83BA;
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }
    .timer-card {
      background: #16102a;
      border: 1px solid #2a2245;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .timer-ring {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 1rem;
    }
    .timer-ring svg { transform: rotate(-90deg); display: block; }
    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .timer-text .time {
      font-size: 2.25rem;
      font-weight: 700;
      color: #EDE9F5;
      font-variant-numeric: tabular-nums;
    }
    .timer-text .label {
      font-size: 0.7rem;
      color: #6B5FD4;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 0.125rem;
    }
    .zone-name {
      font-size: 1rem;
      color: #1D9E75;
      font-weight: 600;
    }
    .info {
      color: #8B83BA;
      font-size: 0.8rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      background: #3D2FA8;
      color: #EDE9F5;
      border: none;
      padding: 0.7rem 1.75rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    .btn:hover { background: #4D3FC0; }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      background: transparent;
      color: #8B83BA;
      border: 1px solid #2a2245;
      padding: 0.7rem 1.75rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 0.625rem;
      transition: background 0.15s, border-color 0.15s;
      width: 100%;
    }
    .btn-secondary:hover { background: rgba(61, 47, 168, 0.12); border-color: #3D2FA8; }
    .btn-disabled {
      background: #2a2245;
      color: #5a5280;
      cursor: default;
      pointer-events: none;
    }
    .reload-link {
      display: inline-block;
      margin-top: 1rem;
      color: #1D9E75;
      font-size: 0.8rem;
      text-decoration: underline;
      cursor: pointer;
    }
    .reload-link:hover { color: #34D399; }
    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1D9E75;
      margin-right: 0.375rem;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .footer {
      margin-top: 1.75rem;
      font-size: 0.7rem;
      color: #4a4270;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
  <body>
    <div class="container">
      <div class="icon">🧘</div>
      <h1>Blocked by Forca</h1>
      <p class="subtitle">You're in Focus Mode</p>

      <div class="timer-card">
        <div class="zone-name" id="zoneName">—</div>

        <div class="timer-ring">
          <svg width="160" height="160" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="85" fill="none" stroke="#1A1435" stroke-width="8"/>
            <circle id="progressCircle" cx="100" cy="100" r="85" fill="none" stroke="#1D9E75" stroke-width="8"
              stroke-linecap="round" stroke-dasharray="534.07" stroke-dashoffset="0"/>
          </svg>
          <div class="timer-text">
            <div class="time" id="timeDisplay">00:00</div>
            <div class="label">remaining</div>
          </div>
        </div>
      </div>

      <div class="info">
        To access this site, pause or end your focus zone in the Forca desktop app.
      </div>

      <button class="btn" id="pauseBtn">⏸ Pause Zone</button>
      <button class="btn-secondary" id="endBtn">⏹ End Zone</button>
      <a href="#" id="reloadLink" class="reload-link" style="display:none" target="_top">Continue to site →</a>

      <div class="footer">
        <span class="status-dot"></span> Synced with Forca
      </div>
    </div>

  <script src="blocked.js"></script>
</body>
</html>
