<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocked by Forca</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' fill='none' stroke='%231D9E75' stroke-width='1.5'/><circle cx='8' cy='8' r='2.5' fill='%231D9E75'/></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1C1917;
      color: #F1EFE8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 460px;
    }
    .icon { margin-bottom: 1.5rem; }
    h1 {
      color: #1D9E75;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #A8A29E;
      font-size: 1rem;
      margin-bottom: 2rem;
    }
    .timer-ring {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 2rem;
    }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .timer-text .time {
      font-size: 2.5rem;
      font-weight: 700;
      color: #F1EFE8;
    }
    .timer-text .label {
      font-size: 0.8rem;
      color: #A8A29E;
      margin-top: 0.25rem;
    }
    .zone-name {
      font-size: 1.1rem;
      color: #1D9E75;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .info {
      color: #A8A29E;
      font-size: 0.85rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      background: #1D9E75;
      color: #F1EFE8;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #059669; }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      background: transparent;
      color: #A8A29E;
      border: 1px solid #44403C;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: rgba(68, 64, 60, 0.15); }
    .btn-disabled {
      background: #292524;
      color: #78716C;
      opacity: 0.5;
      cursor: default;
    }
    .reload-link {
      display: inline-block;
      margin-top: 1rem;
      color: #1D9E75;
      font-size: 0.85rem;
      text-decoration: underline;
      cursor: pointer;
    }
    .reload-link:hover { color: #34D399; }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1D9E75;
      margin-right: 0.5rem;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #57534E;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg width="64" height="64" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
        <circle cx="48" cy="48" r="26" fill="none" stroke="#44403C" stroke-width="3.5"/>
        <circle cx="48" cy="48" r="26" fill="none" stroke="#1D9E75" stroke-width="3.5" stroke-dasharray="81 163" stroke-dashoffset="41" stroke-linecap="round"/>
        <circle cx="48" cy="48" r="7" fill="#1D9E75"/>
        <rect x="46.5" y="18" width="3" height="11" rx="1.5" fill="#78716C"/>
        <rect x="46.5" y="67" width="3" height="11" rx="1.5" fill="#78716C"/>
        <rect x="18" y="46.5" width="11" height="3" rx="1.5" fill="#78716C"/>
        <rect x="67" y="46.5" width="11" height="3" rx="1.5" fill="#78716C"/>
      </svg>
    </div>
    <h1>Blocked by Forca</h1>
    <p class="subtitle">You're in Focus Mode</p>

    <div class="zone-name" id="zoneName">—</div>

    <div class="timer-ring">
      <svg width="200" height="200" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="85" fill="none" stroke="#292524" stroke-width="6"/>
        <circle id="progressCircle" cx="100" cy="100" r="85" fill="none" stroke="#1D9E75" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="534.07" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text">
        <div class="time" id="timeDisplay">00:00</div>
        <div class="label">remaining</div>
      </div>
    </div>

    <div class="info">
      To access this site, pause or end your focus zone in the Forca desktop app.
    </div>

    <button class="btn" id="pauseBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <span class="btn-text">Pause Zone</span>
    </button>
    <br/>
    <button class="btn-secondary" id="endBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      <span class="btn-text">End Zone</span>
    </button>
    <br/>
    <a href="#" id="reloadLink" class="reload-link" style="display:none" target="_top">Continue to site →</a>

    <div class="footer">
      <span class="status-dot"></span> Synced with Forca
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
